<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central Admin</title>

  <style>
    body{margin:0;padding:25px;background:#001845;color:white;font-family:Arial,sans-serif;padding-bottom:80px}
    h1{text-align:center;font-size:42px}
    h2{margin-top:0}
    .card{max-width:700px;margin:0 auto 25px;background:#0d2b5c;padding:25px;border-radius:22px}
    input,select{width:100%;padding:15px;margin-bottom:14px;border:none;border-radius:12px;font-size:16px;box-sizing:border-box}
    button{width:100%;padding:16px;border:none;border-radius:12px;background:#3b82f6;color:white;font-size:18px;cursor:pointer;margin-top:5px}
    .danger{background:#ef4444}
    .linha{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .jogo-item{background:#12376d;padding:15px;border-radius:15px;margin-bottom:12px}
    .jogo-item strong{display:block;margin-bottom:8px}
    @media(max-width:600px){.linha{grid-template-columns:1fr}}
  </style>
</head>

<body>

<script>
  const senha = prompt("Digite a senha do admin:");
  if(senha !== "1234"){
    alert("Acesso negado!");
    window.location.href = "index.html";
  }
</script>

<h1>Central Admin</h1>

<div class="card">
  <h2>Atualizar Time Manualmente</h2>

  <select id="timeTabela"></select>

  <div class="linha">
    <input type="number" id="pontos" placeholder="Pontos">
    <input type="number" id="jogos" placeholder="Jogos">
  </div>

  <div class="linha">
    <input type="number" id="vitorias" placeholder="Vitórias">
    <input type="number" id="empates" placeholder="Empates">
  </div>

  <div class="linha">
    <input type="number" id="derrotas" placeholder="Derrotas">
    <input type="number" id="saldo" placeholder="Saldo">
  </div>

  <div class="linha">
    <input type="number" id="gols_pro" placeholder="Gols Pró">
    <input type="number" id="gols_contra" placeholder="Gols Contra">
  </div>

  <button onclick="atualizarTime()">Salvar Time</button>
</div>

<div class="card">
  <h2>Cadastrar / Editar Jogo</h2>

  <input type="hidden" id="jogoId">

  <div class="linha">
    <select id="timeCasa"></select>
    <select id="timeFora"></select>
  </div>

  <div class="linha">
    <input type="number" id="rodada" placeholder="Rodada">
    <input type="text" id="local" placeholder="Local">
  </div>

  <div class="linha">
    <input type="date" id="data_jogo">
    <input type="text" id="hora_jogo" placeholder="Horário">
  </div>

  <div class="linha">
    <input type="number" id="placar_casa" placeholder="Placar Casa">
    <input type="number" id="placar_fora" placeholder="Placar Fora">
  </div>

  <select id="status">
    <option value="Agendado">Agendado</option>
    <option value="Em andamento">Em andamento</option>
    <option value="Encerrado">Encerrado</option>
    <option value="Adiado">Adiado</option>
  </select>

  <button onclick="salvarJogo()">Salvar Jogo</button>
  <button class="danger" onclick="limparFormularioJogo()">Novo Jogo</button>
</div>

<div class="card">
  <h2>Jogos Cadastrados</h2>
  <div id="listaJogosAdmin">Carregando jogos...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://ewebwjenkeletgshhzvb.supabase.co";
const SUPABASE_KEY = "sb_publishable_EcuCNi9XnjNfhM2VYseGuw_mVaM0Iao";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function carregarTimes(){
  const { data, error } = await supabaseClient
    .from("times")
    .select("*")
    .order("nome", { ascending:true });

  if(error){
    alert("Erro ao carregar times");
    console.log(error);
    return;
  }

  const timeTabela = document.getElementById("timeTabela");
  const timeCasa = document.getElementById("timeCasa");
  const timeFora = document.getElementById("timeFora");

  timeTabela.innerHTML = "";
  timeCasa.innerHTML = "";
  timeFora.innerHTML = "";

  data.forEach(time => {
    timeTabela.innerHTML += `<option value="${time.id}">${time.nome}</option>`;
    timeCasa.innerHTML += `<option value="${time.nome}">${time.nome}</option>`;
    timeFora.innerHTML += `<option value="${time.nome}">${time.nome}</option>`;
  });
}

async function atualizarTime(){
  const id = document.getElementById("timeTabela").value;

  const dados = {
    pontos: Number(document.getElementById("pontos").value || 0),
    jogos: Number(document.getElementById("jogos").value || 0),
    vitorias: Number(document.getElementById("vitorias").value || 0),
    empates: Number(document.getElementById("empates").value || 0),
    derrotas: Number(document.getElementById("derrotas").value || 0),
    saldo: Number(document.getElementById("saldo").value || 0),
    gols_pro: Number(document.getElementById("gols_pro").value || 0),
    gols_contra: Number(document.getElementById("gols_contra").value || 0)
  };

  const { error } = await supabaseClient
    .from("times")
    .update(dados)
    .eq("id", id);

  if(error){
    alert("Erro ao atualizar time");
    console.log(error);
    return;
  }

  alert("Time atualizado!");
}

async function salvarJogo(){
  const id = document.getElementById("jogoId").value;

  const jogo = {
    rodada: Number(document.getElementById("rodada").value || 0),
    time_casa: document.getElementById("timeCasa").value,
    time_fora: document.getElementById("timeFora").value,
    placar_casa: Number(document.getElementById("placar_casa").value || 0),
    placar_fora: Number(document.getElementById("placar_fora").value || 0),
    local: document.getElementById("local").value,
    data_jogo: document.getElementById("data_jogo").value,
    hora_jogo: document.getElementById("hora_jogo").value,
    status: document.getElementById("status").value
  };

  let jogoSalvoId = id;

  if(id){
    const { error } = await supabaseClient
      .from("jogos")
      .update(jogo)
      .eq("id", id);

    if(error){
      alert("Erro ao atualizar jogo");
      console.log(error);
      return;
    }

  } else {
    const { data, error } = await supabaseClient
      .from("jogos")
      .insert([{ ...jogo, computado: false }])
      .select();

    if(error){
      alert("Erro ao cadastrar jogo");
      console.log(error);
      return;
    }

    jogoSalvoId = data[0].id;
  }

  if(jogo.status === "Encerrado"){
    await atualizarTabelaPeloJogo(jogoSalvoId);
  } else {
    alert("Jogo salvo!");
  }

  limparFormularioJogo();
  carregarJogosAdmin();
}

async function atualizarTabelaPeloJogo(jogoId){
  const { data:jogo, error:erroJogo } = await supabaseClient
    .from("jogos")
    .select("*")
    .eq("id", jogoId)
    .single();

  if(erroJogo){
    alert("Erro ao buscar jogo");
    console.log(erroJogo);
    return;
  }

  if(jogo.computado === true){
    alert("Esse jogo já foi computado na tabela.");
    return;
  }

  const { data:times, error:erroTimes } = await supabaseClient
    .from("times")
    .select("*")
    .in("nome", [jogo.time_casa, jogo.time_fora]);

  if(erroTimes){
    alert("Erro ao buscar times");
    console.log(erroTimes);
    return;
  }

  const casa = times.find(t => t.nome === jogo.time_casa);
  const fora = times.find(t => t.nome === jogo.time_fora);

  if(!casa || !fora){
    alert("Erro: nome dos times não bate com a tabela times.");
    console.log(jogo.time_casa, jogo.time_fora, times);
    return;
  }

  const pc = Number(jogo.placar_casa || 0);
  const pf = Number(jogo.placar_fora || 0);

  let pontosCasa = 0;
  let pontosFora = 0;
  let vitoriaCasa = 0;
  let vitoriaFora = 0;
  let empateCasa = 0;
  let empateFora = 0;
  let derrotaCasa = 0;
  let derrotaFora = 0;

  if(pc > pf){
    pontosCasa = 3;
    vitoriaCasa = 1;
    derrotaFora = 1;
  } else if(pc < pf){
    pontosFora = 3;
    vitoriaFora = 1;
    derrotaCasa = 1;
  } else {
    pontosCasa = 1;
    pontosFora = 1;
    empateCasa = 1;
    empateFora = 1;
  }

  const atualizarCasa = await supabaseClient
    .from("times")
    .update({
      pontos: Number(casa.pontos || 0) + pontosCasa,
      jogos: Number(casa.jogos || 0) + 1,
      vitorias: Number(casa.vitorias || 0) + vitoriaCasa,
      empates: Number(casa.empates || 0) + empateCasa,
      derrotas: Number(casa.derrotas || 0) + derrotaCasa,
      gols_pro: Number(casa.gols_pro || 0) + pc,
      gols_contra: Number(casa.gols_contra || 0) + pf,
      saldo: Number(casa.saldo || 0) + pc - pf
    })
    .eq("id", casa.id);

  if(atualizarCasa.error){
    alert("Erro ao atualizar time da casa");
    console.log(atualizarCasa.error);
    return;
  }

  const atualizarFora = await supabaseClient
    .from("times")
    .update({
      pontos: Number(fora.pontos || 0) + pontosFora,
      jogos: Number(fora.jogos || 0) + 1,
      vitorias: Number(fora.vitorias || 0) + vitoriaFora,
      empates: Number(fora.empates || 0) + empateFora,
      derrotas: Number(fora.derrotas || 0) + derrotaFora,
      gols_pro: Number(fora.gols_pro || 0) + pf,
      gols_contra: Number(fora.gols_contra || 0) + pc,
      saldo: Number(fora.saldo || 0) + pf - pc
    })
    .eq("id", fora.id);

  if(atualizarFora.error){
    alert("Erro ao atualizar time visitante");
    console.log(atualizarFora.error);
    return;
  }

  const marcarComputado = await supabaseClient
    .from("jogos")
    .update({ computado: true })
    .eq("id", jogo.id);

  if(marcarComputado.error){
    alert("Tabela atualizada, mas erro ao marcar jogo como computado.");
    console.log(marcarComputado.error);
    return;
  }

  alert("Tabela atualizada automaticamente!");
}

async function carregarJogosAdmin(){
  const lista = document.getElementById("listaJogosAdmin");

  const { data, error } = await supabaseClient
    .from("jogos")
    .select("*")
    .order("rodada", { ascending:true });

  if(error){
    lista.innerHTML = "Erro ao carregar jogos.";
    console.log(error);
    return;
  }

  lista.innerHTML = "";

  data.forEach(jogo => {
    lista.innerHTML += `
      <div class="jogo-item">
        <strong>
          ${jogo.rodada}ª Rodada - 
          ${jogo.time_casa} ${jogo.placar_casa} x ${jogo.placar_fora} ${jogo.time_fora}
        </strong>

        <div>${jogo.data_jogo || ""} • ${jogo.hora_jogo || ""}</div>
        <div>${jogo.local || ""}</div>
        <div>Status: ${jogo.status}</div>
        <div>Computado: ${jogo.computado ? "Sim" : "Não"}</div>

        <button onclick='editarJogo(${JSON.stringify(jogo)})'>
          Editar jogo
        </button>
      </div>
    `;
  });
}

function editarJogo(jogo){
  document.getElementById("jogoId").value = jogo.id;
  document.getElementById("timeCasa").value = jogo.time_casa;
  document.getElementById("timeFora").value = jogo.time_fora;
  document.getElementById("rodada").value = jogo.rodada;
  document.getElementById("local").value = jogo.local || "";
  document.getElementById("data_jogo").value = jogo.data_jogo || "";
  document.getElementById("hora_jogo").value = jogo.hora_jogo || "";
  document.getElementById("placar_casa").value = jogo.placar_casa || 0;
  document.getElementById("placar_fora").value = jogo.placar_fora || 0;
  document.getElementById("status").value = jogo.status;

  window.scrollTo({ top:0, behavior:"smooth" });
}

function limparFormularioJogo(){
  document.getElementById("jogoId").value = "";
  document.getElementById("rodada").value = "";
  document.getElementById("local").value = "";
  document.getElementById("data_jogo").value = "";
  document.getElementById("hora_jogo").value = "";
  document.getElementById("placar_casa").value = "";
  document.getElementById("placar_fora").value = "";
  document.getElementById("status").value = "Agendado";
}

carregarTimes();
carregarJogosAdmin();
</script>

</body>
</html>
