<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>

  <style>

    body{
      margin:0;
      padding:30px;
      background:#001845;
      color:white;
      font-family:Arial, sans-serif;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    .painel{
      max-width:500px;
      margin:auto;
      background:#0d2b5c;
      padding:30px;
      border-radius:20px;
    }

    input{
      width:100%;
      padding:15px;
      margin-bottom:15px;
      border:none;
      border-radius:10px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#2f80ed;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      opacity:.9;
    }

  </style>
</head>

<body>

  <script>

    const senha = prompt("Digite a senha do admin:");

    if(senha !== "1234"){
      alert("Acesso negado!");
      window.location.href = "index.html";
    }

  </script>

  <h1>Painel Admin</h1>

  <div class="painel">

    <input type="text" placeholder="Nome do time">

    <input type="number" placeholder="Pontos">

    <input type="number" placeholder="Jogos">

    <button>Salvar</button>

  </div>

</body>
</html>
