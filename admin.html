<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Admin</title>

<style>
body{margin:0;padding:20px;background:#001845;color:white;font-family:Arial,sans-serif;padding-bottom:100px}
h1{text-align:center;font-size:38px}
.card{max-width:900px;margin:0 auto 20px;background:#0d2b5c;padding:20px;border-radius:20px}
input,select,textarea{width:100%;padding:14px;margin-bottom:12px;border:none;border-radius:12px;font-size:16px;box-sizing:border-box}
button{width:100%;padding:14px;border:none;border-radius:12px;background:#3b82f6;color:white;font-size:16px;font-weight:bold;margin-top:5px;cursor:pointer}
.ok{background:#22c55e;color:#001845}
.warning{background:#f59e0b;color:#001845}
.danger{background:#ef4444}
.item{background:#12376d;padding:15px;border-radius:15px;margin-bottom:10px}
.tabs{max-width:900px;margin:0 auto 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.hidden{display:none}
.linha{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#toast{position:fixed;top:20px;right:20px;background:#22c55e;color:#001845;padding:15px 20px;border-radius:15px;font-weight:bold;display:none;z-index:9999;box-shadow:0 8px 20px rgba(0,0,0,.35)}
@media(max-width:700px){.linha,.tabs{grid-template-columns:1fr}}
</style>
</head>

<body>

<div id="toast"></div>

<script>
const senha = prompt("Digite a senha do admin:");
if(senha !== "1234"){
  alert("Acesso negado!");
  window.location.href = "index.html";
}
</script>

<h1>Central Admin</h1>

<div class="tabs">
  <button onclick="abrirAba('abaJogos')">Jogos</button>
  <button onclick="abrirAba('abaJogadores')">Jogadores</button>
  <button onclick="abrirAba('abaTimes')">Times</button>
</div>

<div id="abaJogos">

<div class="card">
<h2>Cadastrar / Editar Jogo</h2>

<input type="hidden" id="jogoId">

<div class="linha">
<select id="timeCasa"></select>
<select id="timeFora"></select>
</div>

<div class="linha">
<input type="number" id="rodada" placeholder="Rodada">
<input type="text" id="local" placeholder="Estádio">
</div>

<div class="linha">
<input type="date" id="data_jogo">
<input type="text" id="hora_jogo" placeholder="Horário">
</div>

<div class="linha">
<input type="number" id="placar_casa" placeholder="Placar Casa">
<input type="number" id="placar_fora" placeholder="Placar Fora">
</div>

<select id="status">
<option value="Agendado">Agendado</option>
<option value="Em andamento">Em andamento</option>
<option value="Encerrado">Encerrado</option>
<option value="Adiado">Adiado</option>
</select>

<input type="text" id="capacidade" placeholder="Capacidade do estádio">
<input type="text" id="foto_estadio" placeholder="URL foto estádio">
<textarea id="estatisticas" placeholder="Estatísticas"></textarea>

<button class="ok" onclick="salvarJogo()">Salvar Jogo</button>
<button class="warning" onclick="descomputarJogoAtual()">Descomputar Jogo</button>

</div>

<h2>Adicionar Gol</h2>

<select id="jogoGol" onchange="carregarGolsDoJogo()"></select>
<select id="timeGol" onchange="carregarJogadoresDoTime()"></select>

<input type="text" id="minutoGol" placeholder="Minuto. Ex: 34'">
<select id="tipoGol">
<option value="Gol">Gol</option>

<option value="Falta">Falta</option>
</select>
</div>

<button onclick="salvarGol()">Salvar Gol</button>
<div id="listaGolsJogo"></div>
</div>

<div class="card">
<h2>Jogos</h2>
<div id="listaJogosAdmin"></div>
</div>

</div>

<div id="abaJogadores" class="hidden">

<div class="card">
<h2>Cadastrar / Editar Jogador</h2>

<input type="hidden" id="jogadorId">
<input type="text" id="nomeJogador" placeholder="Nome">
<select id="timeJogador"></select>

<div class="linha">
<input type="text" id="posicaoJogador" placeholder="Posição">
<input type="number" id="numeroJogador" placeholder="Número">
</div>

<div class="linha">
<input type="number" id="assistenciasJogador" placeholder="Assistências">
<input type="number" id="amarelosJogador" placeholder="Amarelos">
</div>

<input type="number" id="vermelhosJogador" placeholder="Vermelhos">

<button onclick="salvarJogador()">Salvar Jogador</button>
<button class="danger" onclick="limparJogador()">Novo Jogador</button>
</div>

<div class="card">
<h2>Jogadores</h2>
<div id="listaJogadores"></div>
</div>

</div>

<div id="abaTimes" class="hidden">

<div class="card">
<h2>Times</h2>

<select id="timeTabela"></select>
<button onclick="preencherTimeManual()">Carregar Dados</button>

<div class="linha">
<input type="number" id="pontos" placeholder="Pontos">
<input type="number" id="jogos" placeholder="Jogos">
</div>

<div class="linha">
<input type="number" id="vitorias" placeholder="Vitórias">
<input type="number" id="empates" placeholder="Empates">
</div>

<div class="linha">
<input type="number" id="derrotas" placeholder="Derrotas">
<input type="number" id="saldo" placeholder="Saldo">
</div>

<input type="number" id="gols_pro" placeholder="Gols Pró">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://ewebwjenkeletgshhzvb.supabase.co";
const SUPABASE_KEY = "sb_publishable_EcuCNi9XnjNfhM2VYseGuw_mVaM0Iao";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let jogosCache = [];
let timesCache = [];

function notificar(texto,tipo="sucesso"){
  const toast=document.getElementById("toast");
  toast.innerText=texto;

  if(tipo==="erro"){
    toast.style.background="#ef4444";
    toast.style.color="white";
  }else if(tipo==="aviso"){
    toast.style.background="#f59e0b";
    toast.style.color="#001845";
  }else{
    toast.style.background="#22c55e";
    toast.style.color="#001845";
  }

  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",3000);
}

function abrirAba(id){
  document.getElementById("abaJogos").classList.add("hidden");
  document.getElementById("abaJogadores").classList.add("hidden");
  document.getElementById("abaTimes").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

async function carregarTimes(){
  const {data,error}=await supabaseClient.from("times").select("*").order("nome",{ascending:true});
  if(error){notificar(error.message,"erro");return;}

  timesCache=data;

  ["timeCasa","timeFora","timeGol","timeJogador","timeTabela"].forEach(id=>{
    document.getElementById(id).innerHTML="";
  });

  data.forEach(t=>{
    document.getElementById("timeCasa").innerHTML+=`<option value="${t.nome}">${t.nome}</option>`;
    document.getElementById("timeFora").innerHTML+=`<option value="${t.nome}">${t.nome}</option>`;
    document.getElementById("timeGol").innerHTML+=`<option value="${t.nome}">${t.nome}</option>`;
    document.getElementById("timeJogador").innerHTML+=`<option value="${t.nome}">${t.nome}</option>`;
    document.getElementById("timeTabela").innerHTML+=`<option value="${t.id}">${t.nome}</option>`;
  });

  carregarJogadoresDoTime();
}

function dadosJogo(){
  return{
    rodada:Number(document.getElementById("rodada").value||0),
    time_casa:document.getElementById("timeCasa").value,
    time_fora:document.getElementById("timeFora").value,
    placar_casa:Number(document.getElementById("placar_casa").value||0),
    placar_fora:Number(document.getElementById("placar_fora").value||0),
    local:document.getElementById("local").value,
    data_jogo:document.getElementById("data_jogo").value,
    hora_jogo:document.getElementById("hora_jogo").value,
    status:document.getElementById("status").value,
    capacidade:document.getElementById("capacidade").value,
    foto_estadio:document.getElementById("foto_estadio").value,
    estatisticas:document.getElementById("estatisticas").value
  };
}





async function salvarJogo(){
  const id=document.getElementById("jogoId").value;
  const jogo=dadosJogo();

  if(jogo.time_casa===jogo.time_fora){
    notificar("Os times não podem ser iguais.","aviso");
    return;
  }

  let jogoId=id;

  if(id){
    const {error}=await supabaseClient.from("jogos").update(jogo).eq("id",id);
    if(error){notificar(error.message,"erro");return;}
  }else{
    const {data,error}=await supabaseClient.from("jogos").insert([{...jogo,computado:false}]).select();
    if(error){notificar(error.message,"erro");return;}
    jogoId=data[0].id;
  }

  if(jogo.status==="Encerrado"){
    await computarJogo(jogoId);
  }else{
    notificar("Jogo salvo!");
  }

  limparFormularioJogo();
  carregarJogosAdmin();
  carregarJogosSelect();
}

function resultado(jogo){
  const pc=Number(jogo.placar_casa||0);
  const pf=Number(jogo.placar_fora||0);

  const casa={pontos:0,jogos:1,vitorias:0,empates:0,derrotas:0,gols_pro:pc,gols_contra:pf,saldo:pc-pf};
  const fora={pontos:0,jogos:1,vitorias:0,empates:0,derrotas:0,gols_pro:pf,gols_contra:pc,saldo:pf-pc};

  if(pc>pf){casa.pontos=3;casa.vitorias=1;fora.derrotas=1;}
  else if(pc<pf){fora.pontos=3;fora.vitorias=1;casa.derrotas=1;}
  else{casa.pontos=1;fora.pontos=1;casa.empates=1;fora.empates=1;}

  return{casa,fora};
}





async function alterarTabela(jogo,modo){
  const {data:times,error}=await supabaseClient.from("times").select("*").in("nome",[jogo.time_casa,jogo.time_fora]);
  if(error){notificar(error.message,"erro");return false;}

  const timeCasa=times.find(t=>t.nome===jogo.time_casa);
  const timeFora=times.find(t=>t.nome===jogo.time_fora);

  if(!timeCasa||!timeFora){
    notificar("Nome dos times não bate com a tabela times.","erro");
    return false;
  }

  const r=resultado(jogo);
  const mult=modo==="somar"?1:-1;

  const novoCasa={
    pontos:Math.max(0,Number(timeCasa.pontos||0)+r.casa.pontos*mult),
    jogos:Math.max(0,Number(timeCasa.jogos||0)+r.casa.jogos*mult),
    vitorias:Math.max(0,Number(timeCasa.vitorias||0)+r.casa.vitorias*mult),
    empates:Math.max(0,Number(timeCasa.empates||0)+r.casa.empates*mult),
    derrotas:Math.max(0,Number(timeCasa.derrotas||0)+r.casa.derrotas*mult),
    gols_pro:Math.max(0,Number(timeCasa.gols_pro||0)+r.casa.gols_pro*mult),
    gols_contra:Math.max(0,Number(timeCasa.gols_contra||0)+r.casa.gols_contra*mult),
    saldo:Number(timeCasa.saldo||0)+r.casa.saldo*mult
  };

  const novoFora={
    pontos:Math.max(0,Number(timeFora.pontos||0)+r.fora.pontos*mult),
    jogos:Math.max(0,Number(timeFora.jogos||0)+r.fora.jogos*mult),
    vitorias:Math.max(0,Number(timeFora.vitorias||0)+r.fora.vitorias*mult),
    empates:Math.max(0,Number(timeFora.empates||0)+r.fora.empates*mult),
    derrotas:Math.max(0,Number(timeFora.derrotas||0)+r.fora.derrotas*mult),
    gols_pro:Math.max(0,Number(timeFora.gols_pro||0)+r.fora.gols_pro*mult),
    gols_contra:Math.max(0,Number(timeFora.gols_contra||0)+r.fora.gols_contra*mult),
    saldo:Number(timeFora.saldo||0)+r.fora.saldo*mult
  };

  const c=await supabaseClient.from("times").update(novoCasa).eq("id",timeCasa.id);
  if(c.error){notificar(c.error.message,"erro");return false;}

  const f=await supabaseClient.from("times").update(novoFora).eq("id",timeFora.id);
  if(f.error){notificar(f.error.message,"erro");return false;}

  return true;
}

async function computarJogo(id){
  const {data:jogo,error}=await supabaseClient.from("jogos").select("*").eq("id",id).single();
  if(error){notificar(error.message,"erro");return;}

  if(jogo.computado===true){
    notificar("Esse jogo já foi computado. Descompute antes.","aviso");
    return;
  }

  const ok=await alterarTabela(jogo,"somar");
  if(!ok)return;

  await supabaseClient.from("jogos").update({computado:true}).eq("id",id);
  notificar("Jogo computado na tabela!");
  carregarTimes();
}

async function descomputarJogo(id){
  if(!confirm("Descomputar esse jogo da tabela?"))return;

  const {data:jogo,error}=await supabaseClient.from("jogos").select("*").eq("id",id).single();
  if(error){notificar(error.message,"erro");return;}

  if(jogo.computado!==true){
    notificar("Esse jogo ainda não está computado.","aviso");
    return;
  }

  const ok=await alterarTabela(jogo,"subtrair");
  if(!ok)return;

  await supabaseClient.from("jogos").update({computado:false}).eq("id",id);
  notificar("Jogo descomputado!");
  carregarJogosAdmin();
  carregarTimes();
}

function descomputarJogoAtual(){
  const id=document.getElementById("jogoId").value;
  if(!id){notificar("Escolha um jogo primeiro.","aviso");return;}
  descomputarJogo(id);
}

async function excluirJogo(id){
  const {data:jogo,error}=await supabaseClient.from("jogos").select("*").eq("id",id).single();
  if(error){notificar(error.message,"erro");return;}

  if(jogo.computado===true){
    notificar("Descompute o jogo antes de excluir.","aviso");
    return;
  }

  if(!confirm("Excluir esse jogo definitivamente?"))return;

  await supabaseClient.from("gols_jogo").delete().eq("jogo_id",id);

  const del=await supabaseClient.from("jogos").delete().eq("id",id);
  if(del.error){notificar(del.error.message,"erro");return;}

  notificar("Jogo excluído!");
  carregarJogosAdmin();
  carregarJogosSelect();
}

async function carregarJogosAdmin(){
  const lista=document.getElementById("listaJogosAdmin");

  const {data,error}=await supabaseClient.from("jogos").select("*").order("rodada",{ascending:true});
  if(error){notificar(error.message,"erro");return;}

  jogosCache=data;
  lista.innerHTML="";

  data.forEach(j=>{
    lista.innerHTML+=`
      <div class="item">
        <strong>${j.rodada}ª - ${j.time_casa} ${j.placar_casa} x ${j.placar_fora} ${j.time_fora}</strong>
        <div>${j.local||""}</div>
        <div>Status: ${j.status}</div>
        <div>Computado: ${j.computado?"Sim":"Não"}</div>
        <button onclick='editarJogo(${JSON.stringify(j)})'>Editar</button>
        <button class="warning" onclick="descomputarJogo(${j.id})">Descomputar</button>
        <button class="danger" onclick="excluirJogo(${j.id})">Excluir</button>
      </div>
    `;
  });
}

function editarJogo(j){
  abrirAba("abaJogos");

  document.getElementById("jogoId").value=j.id;
  document.getElementById("timeCasa").value=j.time_casa;
  document.getElementById("timeFora").value=j.time_fora;
  document.getElementById("rodada").value=j.rodada||"";
  document.getElementById("local").value=j.local||"";
  document.getElementById("data_jogo").value=j.data_jogo||"";
  document.getElementById("hora_jogo").value=j.hora_jogo||"";
  document.getElementById("placar_casa").value=j.placar_casa||0;
  document.getElementById("placar_fora").value=j.placar_fora||0;
  document.getElementById("status").value=j.status||"Agendado";
  document.getElementById("capacidade").value=j.capacidade||"";
  document.getElementById("foto_estadio").value=j.foto_estadio||"";
  document.getElementById("estatisticas").value=j.estatisticas||"";

  document.getElementById("jogoGol").value=j.id;
  carregarGolsDoJogo();

  window.scrollTo({top:0,behavior:"smooth"});
}

function limparFormularioJogo(){
  document.getElementById("jogoId").value="";
  document.getElementById("rodada").value="";
  document.getElementById("local").value="";
  document.getElementById("data_jogo").value="";
  document.getElementById("hora_jogo").value="";
  document.getElementById("placar_casa").value="";
  document.getElementById("placar_fora").value="";
  document.getElementById("status").value="Agendado";
  document.getElementById("capacidade").value="";
  document.getElementById("foto_estadio").value="";
  document.getElementById("estatisticas").value="";
}

async function carregarJogosSelect(){
  const select=document.getElementById("jogoGol");
  select.innerHTML="";

  jogosCache.forEach(j=>{
    select.innerHTML+=`<option value="${j.id}">${j.rodada}ª - ${j.time_casa} x ${j.time_fora}</option>`;
  });

  carregarGolsDoJogo();
}

async function carregarJogadoresDoTime(){
  const time=document.getElementById("timeGol").value;

  const {data,error}=await supabaseClient.from("jogadores").select("*").eq("time",time).order("nome",{ascending:true});
  if(error)return;

  const select=document.getElementById("jogadorGol");
  select.innerHTML="";

  data.forEach(j=>{
    select.innerHTML+=`<option value="${j.nome}">${j.nome}</option>`;
  });
}

async function salvarGol(){

  const jogoId = Number(
    document.getElementById("jogoGol").value
  );

  const jogoSelecionado = jogosCache.find(
    j => Number(j.id) === jogoId
  );

  const gol = {

    jogo_id: jogoId,

    jogo: jogoSelecionado
      ? `${jogoSelecionado.time_casa} x ${jogoSelecionado.time_fora}`
      : "",

    time: document.getElementById("timeGol").value,

    jogador: document.getElementById("jogadorGol").value,

    minuto: document.getElementById("minutoGol").value,

    tipo: document.getElementById("tipoGol").value

  };

  const { error } = await supabaseClient
    .from("gols_jogo")
    .insert([gol]);

  if(error){

    notificar(error.message,"erro");
    console.log(error);
    return;

  }

  document.getElementById("minutoGol").value = "";

  notificar("Gol salvo!");

  carregarGolsDoJogo();

}



async function carregarGolsDoJogo(){
  const jogoId=document.getElementById("jogoGol").value;
  const area=document.getElementById("listaGolsJogo");

  if(!jogoId){area.innerHTML="";return;}

  const {data,error}=await supabaseClient.from("gols_jogo").select("*").eq("jogo_id",jogoId);
  if(error)return;

  area.innerHTML="<h3>Gols cadastrados</h3>";

  data.forEach(g=>{
    area.innerHTML+=`
      <div class="item">
        <strong>${g.jogador} - ${g.time}</strong>
        <div>${g.minuto||""} • ${g.tipo||""}</div>
        <button class="danger" onclick="excluirGol(${g.id})">Excluir gol</button>
      </div>
    `;
  });
}




async function excluirGol(id){
  if(!confirm("Excluir esse gol?"))return;

  const {error}=await supabaseClient.from("gols_jogo").delete().eq("id",id);
  if(error){notificar(error.message,"erro");return;}

  notificar("Gol excluído!");
  carregarGolsDoJogo();
}




async function salvarJogador(){
  const id=document.getElementById("jogadorId").value;

  const jogador={
    nome:document.getElementById("nomeJogador").value,
    time:document.getElementById("timeJogador").value,
    posicao:document.getElementById("posicaoJogador").value,
    numero:Number(document.getElementById("numeroJogador").value||0),
    assistencias:Number(document.getElementById("assistenciasJogador").value||0),
    cartoes_amarelos:Number(document.getElementById("amarelosJogador").value||0),
    cartoes_vermelhos:Number(document.getElementById("vermelhosJogador").value||0)
  };



  let r;

  if(id){
    r=await supabaseClient.from("jogadores").update(jogador).eq("id",id);
  }else{
    r=await supabaseClient.from("jogadores").insert([jogador]);
  }

  if(r.error){notificar(r.error.message,"erro");return;}

  notificar("Jogador salvo!");
  limparJogador();
  carregarJogadores();
}

async function carregarJogadores(){
  const lista=document.getElementById("listaJogadores");

  const {data,error}=await supabaseClient.from("jogadores").select("*").order("nome",{ascending:true});
  if(error){lista.innerHTML="Erro ao carregar jogadores.";return;}

  lista.innerHTML="";

  data.forEach(j=>{
    lista.innerHTML+=`
      <div class="item">
        <strong>${j.nome} - ${j.time}</strong>
        <div>${j.posicao||""} • Nº ${j.numero||""}</div>
        <div>Assistências: ${j.assistencias||0}</div>
        <div>Amarelos: ${j.cartoes_amarelos||0} | Vermelhos: ${j.cartoes_vermelhos||0}</div>
        <button onclick='editarJogador(${JSON.stringify(j)})'>Editar</button>
      </div>
    `;
  });

  carregarJogadoresDoTime();
}

  document.getElementById("nomeJogador").value=j.nome||"";
  document.getElementById("timeJogador").value=j.time||"";
  document.getElementById("posicaoJogador").value=j.posicao||"";
  document.getElementById("numeroJogador").value=j.numero||0;
  document.getElementById("assistenciasJogador").value=j.assistencias||0;
  document.getElementById("amarelosJogador").value=j.cartoes_amarelos||0;
  document.getElementById("vermelhosJogador").value=j.cartoes_vermelhos||0;

function limparJogador(){
  document.getElementById("jogadorId").value="";
  document.getElementById("nomeJogador").value="";
  document.getElementById("posicaoJogador").value="";
  document.getElementById("numeroJogador").value="";
  document.getElementById("assistenciasJogador").value="";
  document.getElementById("amarelosJogador").value="";
  document.getElementById("vermelhosJogador").value="";
}

function preencherTimeManual(){
  const id=document.getElementById("timeTabela").value;
  const time=timesCache.find(t=>String(t.id)===String(id));

  if(!time)return;

  document.getElementById("pontos").value=time.pontos||0;
  document.getElementById("jogos").value=time.jogos||0;
  document.getElementById("vitorias").value=time.vitorias||0;
  document.getElementById("empates").value=time.empates||0;
  document.getElementById("derrotas").value=time.derrotas||0;
  document.getElementById("saldo").value=time.saldo||0;
  document.getElementById("gols_pro").value=time.gols_pro||0;
  document.getElementById("gols_contra").value=time.gols_contra||0;
}

async function atualizarTime(){
  const id=document.getElementById("timeTabela").value;

  const dados={
    pontos:Number(document.getElementById("pontos").value||0),
    jogos:Number(document.getElementById("jogos").value||0),
    vitorias:Number(document.getElementById("vitorias").value||0),
    empates:Number(document.getElementById("empates").value||0),
    derrotas:Number(document.getElementById("derrotas").value||0),
    saldo:Number(document.getElementById("saldo").value||0),
    gols_pro:Number(document.getElementById("gols_pro").value||0),
    gols_contra:Number(document.getElementById("gols_contra").value||0)
  };

  const {error}=await supabaseClient.from("times").update(dados).eq("id",id);
  if(error){notificar(error.message,"erro");return;}

  notificar("Time atualizado!");
  carregarTimes();
}

async function iniciar(){
  await carregarTimes();
  await carregarJogosAdmin();
  carregarJogosSelect();
  carregarJogadores();
}

iniciar();
</script>
