<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin</title>

  <style>

    body{
      margin:0;
      padding:30px;
      background:#001845;
      color:white;
      font-family:Arial, sans-serif;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      font-size:50px;
    }

    .painel{
      max-width:500px;
      margin:auto;
      background:#0d2b5c;
      padding:30px;
      border-radius:25px;
    }

    select,
    input{
      width:100%;
      padding:18px;
      margin-bottom:18px;
      border:none;
      border-radius:12px;
      font-size:18px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:12px;
      background:#3b82f6;
      color:white;
      font-size:20px;
      cursor:pointer;
    }

    button:hover{
      opacity:.9;
    }

  </style>
</head>

<body>

  <script>

    const senha = prompt("Digite a senha do admin:");

    if(senha !== "1234"){
      alert("Acesso negado!");
      window.location.href = "index.html";
    }

  </script>

  <h1>Painel Admin</h1>

  <div class="painel">

    <select id="timeSelect">
      <option>Carregando times...</option>
    </select>

    <input type="number" id="pontos" placeholder="Pontos">

    <input type="number" id="jogos" placeholder="Jogos">

    <input type="number" id="vitorias" placeholder="Vitórias">

    <input type="number" id="empates" placeholder="Empates">

    <input type="number" id="derrotas" placeholder="Derrotas">

    <input type="number" id="gols_pro" placeholder="Gols Pró">

    <input type="number" id="gols_contra" placeholder="Gols Contra">

    <input type="number" id="saldo" placeholder="Saldo">

    <button onclick="salvar()">Salvar</button>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>

    const SUPABASE_URL = "https://ewebwjenkeletgshhzvb.supabase.co";

    const SUPABASE_KEY = "sb_publishable_EcuCNi9XnjNfhM2VYseGuw_mVaM0Iao";

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    async function carregarTimes(){

      const select = document.getElementById("timeSelect");

      const { data, error } = await supabaseClient
        .from("times")
        .select("*")
        .order("nome", { ascending: true });

      if(error){
        console.log(error);
        return;
      }

      select.innerHTML = "";

      data.forEach((time) => {

        select.innerHTML += `
          <option value="${time.id}">
            ${time.nome}
          </option>
        `;

      });

    }

    async function salvar(){

      const id = document.getElementById("timeSelect").value;

      const pontos = document.getElementById("pontos").value;

      const jogos = document.getElementById("jogos").value;

      const vitorias = document.getElementById("vitorias").value;

      const empates = document.getElementById("empates").value;

      const derrotas = document.getElementById("derrotas").value;

      const gols_pro = document.getElementById("gols_pro").value;

      const gols_contra = document.getElementById("gols_contra").value;

      const saldo = document.getElementById("saldo").value;

      const { error } = await supabaseClient
        .from("times")
        .update({
          pontos,
          jogos,
          vitorias,
          empates,
          derrotas,
          gols_pro,
          gols_contra,
          saldo
        })
        .eq("id", id);

      if(error){
        alert("Erro ao salvar");
        console.log(error);
        return;
      }

      alert("Time atualizado com sucesso!");

    }

    carregarTimes();

  </script>

</body>
</html>
