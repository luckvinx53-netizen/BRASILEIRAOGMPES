<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Admin</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#001845;
  color:white;
  font-family:Arial,sans-serif;
  padding-bottom:100px;
}

h1{
  text-align:center;
  font-size:38px;
}

.card{
  max-width:900px;
  margin:0 auto 20px;
  background:#0d2b5c;
  padding:20px;
  border-radius:20px;
}

input,select,textarea{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#3b82f6;
  color:white;
  font-size:16px;
  font-weight:bold;
  margin-top:5px;
  cursor:pointer;
}

.ok{background:#22c55e;color:#001845}
.warning{background:#f59e0b;color:#001845}
.danger{background:#ef4444}

.item{
  background:#12376d;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

.tabs{
  max-width:900px;
  margin:0 auto 20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.hidden{
  display:none;
}

.linha{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media(max-width:700px){
  .linha,.tabs{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<script>
const senha = prompt("Digite a senha do admin:");

if(senha !== "1234"){
  alert("Acesso negado!");
  window.location.href = "index.html";
}
</script>

<h1>Central Admin</h1>

<div class="tabs">
<button onclick="abrirAba('abaJogos')">Jogos</button>
<button onclick="abrirAba('abaJogadores')">Jogadores</button>
<button onclick="abrirAba('abaTimes')">Times</button>
</div>

<div id="abaJogos">

<div class="card">

<h2>Cadastrar / Editar Jogo</h2>

<input type="hidden" id="jogoId">

<div class="linha">
<select id="timeCasa"></select>
<select id="timeFora"></select>
</div>

<div class="linha">
<input type="number" id="rodada" placeholder="Rodada">
<input type="text" id="local" placeholder="Estádio">
</div>

<div class="linha">
<input type="date" id="data_jogo">
<input type="text" id="hora_jogo" placeholder="Horário">
</div>

<div class="linha">
<input type="number" id="placar_casa" placeholder="Placar Casa">
<input type="number" id="placar_fora" placeholder="Placar Fora">
</div>

<select id="status">
<option value="Agendado">Agendado</option>
<option value="Em andamento">Em andamento</option>
<option value="Encerrado">Encerrado</option>
<option value="Adiado">Adiado</option>
</select>

<input type="text" id="capacidade" placeholder="Capacidade do estádio">
<input type="text" id="foto_estadio" placeholder="URL foto estádio">

<textarea id="estatisticas" placeholder="Estatísticas"></textarea>

<button class="ok" onclick="salvarJogo()">Salvar Jogo</button>
<button class="warning" onclick="descomputarJogoAtual()">Descomputar</button>
<button class="danger" onclick="limparFormularioJogo()">Novo Jogo</button>

</div>

<div class="card">

<h2>Adicionar Gol</h2>

<select id="jogoGol"></select>

<select id="timeGol" onchange="carregarJogadoresDoTime()"></select>

<select id="jogadorGol"></select>

<div class="linha">
<input type="text" id="minutoGol" placeholder="Minuto">
<select id="tipoGol">
<option value="Gol">Gol</option>
<option value="Pênalti">Pênalti</option>
<option value="Contra">Contra</option>
<option value="Falta">Falta</option>
</select>
</div>

<button onclick="salvarGol()">Salvar Gol</button>

<div id="listaGolsJogo"></div>

</div>

<div class="card">

<h2>Jogos</h2>

<div id="listaJogosAdmin"></div>

</div>

</div>

<div id="abaJogadores" class="hidden">

<div class="card">

<h2>Cadastrar Jogador</h2>

<input type="hidden" id="jogadorId">

<input type="text" id="nomeJogador" placeholder="Nome">

<select id="timeJogador"></select>

<div class="linha">
<input type="text" id="posicaoJogador" placeholder="Posição">
<input type="number" id="numeroJogador" placeholder="Número">
</div>

<div class="linha">
<input type="number" id="assistenciasJogador" placeholder="Assistências">
<input type="number" id="amarelosJogador" placeholder="Amarelos">
</div>

<input type="number" id="vermelhosJogador" placeholder="Vermelhos">

<button onclick="salvarJogador()">Salvar Jogador</button>

</div>

<div class="card">

<h2>Jogadores</h2>

<div id="listaJogadores"></div>

</div>

</div>

<div id="abaTimes" class="hidden">

<div class="card">

<h2>Times</h2>

<select id="timeTabela"></select>

<button onclick="preencherTimeManual()">Carregar Dados</button>

<div class="linha">
<input type="number" id="pontos" placeholder="Pontos">
<input type="number" id="jogos" placeholder="Jogos">
</div>

<div class="linha">
<input type="number" id="vitorias" placeholder="Vitórias">
<input type="number" id="empates" placeholder="Empates">
</div>

<div class="linha">
<input type="number" id="derrotas" placeholder="Derrotas">
<input type="number" id="saldo" placeholder="Saldo">
</div>

<div class="linha">
<input type="number" id="gols_pro" placeholder="Gols Pró">
<input type="number" id="gols_contra" placeholder="Gols Contra">
</div>

<button onclick="atualizarTime()">Salvar Time</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL = "https://ewebwjenkeletgshhzvb.supabase.co";
const SUPABASE_KEY = "sb_publishable_EcuCNi9XnjNfhM2VYseGuw_mVaM0Iao";

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let jogosCache = [];
let timesCache = [];

function abrirAba(id){

  document.getElementById("abaJogos").classList.add("hidden");
  document.getElementById("abaJogadores").classList.add("hidden");
  document.getElementById("abaTimes").classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");

}

async function carregarTimes(){

  const { data } = await supabaseClient
    .from("times")
    .select("*")
    .order("nome",{ascending:true});

  timesCache = data;

  [
    "timeCasa",
    "timeFora",
    "timeGol",
    "timeJogador",
    "timeTabela"
  ].forEach(id=>{
    document.getElementById(id).innerHTML="";
  });

  data.forEach(t=>{

    document.getElementById("timeCasa").innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
    document.getElementById("timeFora").innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
    document.getElementById("timeGol").innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
    document.getElementById("timeJogador").innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
    document.getElementById("timeTabela").innerHTML += `<option value="${t.id}">${t.nome}</option>`;

  });

}

async function salvarJogo(){

  const id = document.getElementById("jogoId").value;

  const jogo = {

    rodada:Number(document.getElementById("rodada").value || 0),

    time_casa:document.getElementById("timeCasa").value,

    time_fora:document.getElementById("timeFora").value,

    placar_casa:Number(document.getElementById("placar_casa").value || 0),

    placar_fora:Number(document.getElementById("placar_fora").value || 0),

    local:document.getElementById("local").value,

    data_jogo:document.getElementById("data_jogo").value,

    hora_jogo:document.getElementById("hora_jogo").value,

    status:document.getElementById("status").value,

    capacidade:document.getElementById("capacidade").value,

    foto_estadio:document.getElementById("foto_estadio").value,

    estatisticas:document.getElementById("estatisticas").value

  };

  let jogoId = id;

  if(id){

    const { error } = await supabaseClient
      .from("jogos")
      .update(jogo)
      .eq("id",id);

    if(error){
      alert(error.message);
      return;
    }

  }else{

    const { data,error } = await supabaseClient
      .from("jogos")
      .insert([{...jogo,computado:false}])
      .select();

    if(error){
      alert(error.message);
      return;
    }

    jogoId = data[0].id;

  }

  alert("Jogo salvo!");

  carregarJogosAdmin();
  carregarJogosSelect();

}

async function carregarJogosAdmin(){

  const lista = document.getElementById("listaJogosAdmin");

  const { data } = await supabaseClient
    .from("jogos")
    .select("*")
    .order("rodada",{ascending:true});

  jogosCache = data;

  lista.innerHTML = "";

  data.forEach(j=>{

    lista.innerHTML += `
      <div class="item">

        <strong>
          ${j.rodada}ª -
          ${j.time_casa}
          ${j.placar_casa}
          x
          ${j.placar_fora}
          ${j.time_fora}
        </strong>

        <div>${j.local || ""}</div>

        <div>Status: ${j.status}</div>

        <button onclick='editarJogo(${JSON.stringify(j)})'>
          Editar
        </button>

      </div>
    `;

  });

}

function editarJogo(j){

  document.getElementById("jogoId").value = j.id;
  document.getElementById("timeCasa").value = j.time_casa;
  document.getElementById("timeFora").value = j.time_fora;
  document.getElementById("rodada").value = j.rodada || "";
  document.getElementById("local").value = j.local || "";
  document.getElementById("data_jogo").value = j.data_jogo || "";
  document.getElementById("hora_jogo").value = j.hora_jogo || "";
  document.getElementById("placar_casa").value = j.placar_casa || 0;
  document.getElementById("placar_fora").value = j.placar_fora || 0;
  document.getElementById("status").value = j.status || "Agendado";
  document.getElementById("capacidade").value = j.capacidade || "";
  document.getElementById("foto_estadio").value = j.foto_estadio || "";
  document.getElementById("estatisticas").value = j.estatisticas || "";

}

function limparFormularioJogo(){

  document.getElementById("jogoId").value="";
  document.getElementById("rodada").value="";
  document.getElementById("local").value="";
  document.getElementById("data_jogo").value="";
  document.getElementById("hora_jogo").value="";
  document.getElementById("placar_casa").value="";
  document.getElementById("placar_fora").value="";
  document.getElementById("status").value="Agendado";
  document.getElementById("capacidade").value="";
  document.getElementById("foto_estadio").value="";
  document.getElementById("estatisticas").value="";

}

async function carregarJogosSelect(){

  const select = document.getElementById("jogoGol");

  select.innerHTML = "";

  jogosCache.forEach(j=>{

    select.innerHTML += `
      <option value="${j.id}">
        ${j.rodada}ª -
        ${j.time_casa}
        x
        ${j.time_fora}
      </option>
    `;

  });

}

async function carregarJogadoresDoTime(){

  const time = document.getElementById("timeGol").value;

  const { data } = await supabaseClient
    .from("jogadores")
    .select("*")
    .eq("time",time);

  const select = document.getElementById("jogadorGol");

  select.innerHTML = "";

  data.forEach(j=>{

    select.innerHTML += `
      <option value="${j.nome}">
        ${j.nome}
      </option>
    `;

  });

}

async function salvarGol(){

  const gol = {

    jogo_id:Number(document.getElementById("jogoGol").value),

    time:document.getElementById("timeGol").value,

    jogador:document.getElementById("jogadorGol").value,

    minuto:document.getElementById("minutoGol").value,

    tipo:document.getElementById("tipoGol").value

  };

  const { error } = await supabaseClient
    .from("gols_jogo")
    .insert([gol]);

  if(error){
    alert(error.message);
    return;
  }

  alert("Gol salvo!");

}

async function salvarJogador(){

  const id = document.getElementById("jogadorId").value;

  const jogador = {

    nome:document.getElementById("nomeJogador").value,

    time:document.getElementById("timeJogador").value,

    posicao:document.getElementById("posicaoJogador").value,

    numero:Number(document.getElementById("numeroJogador").value || 0),

    assistencias:Number(document.getElementById("assistenciasJogador").value || 0),

    cartoes_amarelos:Number(document.getElementById("amarelosJogador").value || 0),

    cartoes_vermelhos:Number(document.getElementById("vermelhosJogador").value || 0)

  };

  let response;

  if(id){

    response = await supabaseClient
      .from("jogadores")
      .update(jogador)
      .eq("id",id);

  }else{

    response = await supabaseClient
      .from("jogadores")
      .insert([jogador]);

  }

  if(response.error){
    alert(response.error.message);
    return;
  }

  alert("Jogador salvo!");

  carregarJogadores();

}

async function carregarJogadores(){

  const lista = document.getElementById("listaJogadores");

  const { data } = await supabaseClient
    .from("jogadores")
    .select("*")
    .order("nome",{ascending:true});

  lista.innerHTML = "";

  data.forEach(j=>{

    lista.innerHTML += `
      <div class="item">

        <strong>
          ${j.nome}
          -
          ${j.time}
        </strong>

        <div>
          ${j.posicao || ""}
        </div>

        <div>
          Nº ${j.numero || ""}
        </div>

      </div>
    `;

  });

}

function preencherTimeManual(){

  const id = document.getElementById("timeTabela").value;

  const time = timesCache.find(
    t=>String(t.id)===String(id)
  );

  if(!time)return;

  document.getElementById("pontos").value = time.pontos || 0;
  document.getElementById("jogos").value = time.jogos || 0;
  document.getElementById("vitorias").value = time.vitorias || 0;
  document.getElementById("empates").value = time.empates || 0;
  document.getElementById("derrotas").value = time.derrotas || 0;
  document.getElementById("saldo").value = time.saldo || 0;
  document.getElementById("gols_pro").value = time.gols_pro || 0;
  document.getElementById("gols_contra").value = time.gols_contra || 0;

}

async function atualizarTime(){

  const id = document.getElementById("timeTabela").value;

  const dados = {

    pontos:Number(document.getElementById("pontos").value || 0),

    jogos:Number(document.getElementById("jogos").value || 0),

    vitorias:Number(document.getElementById("vitorias").value || 0),

    empates:Number(document.getElementById("empates").value || 0),

    derrotas:Number(document.getElementById("derrotas").value || 0),

    saldo:Number(document.getElementById("saldo").value || 0),

    gols_pro:Number(document.getElementById("gols_pro").value || 0),

    gols_contra:Number(document.getElementById("gols_contra").value || 0)

  };

  const { error } = await supabaseClient
    .from("times")
    .update(dados)
    .eq("id",id);

  if(error){
    alert(error.message);
    return;
  }

  alert("Time atualizado!");

}

carregarTimes();
carregarJogosAdmin();
carregarJogosSelect();
carregarJogadores();

</script>

</body>
</html>
