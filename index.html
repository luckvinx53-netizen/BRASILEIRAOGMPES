<!-- index.html -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brasileirão Betano 2026</title>

  <style>

    body{
      margin:0;
      padding:0;
      background:#001845;
      color:white;
      font-family:Arial, sans-serif;
      padding-bottom:100px;
    }

    .container{
      width:90%;
      margin:auto;
      padding-top:30px;
    }

    .hero{
      background:#0d2b5c;
      border-radius:30px;
      padding:30px;
      margin-bottom:25px;
    }

    .tag{
      background:#0f5132;
      display:inline-block;
      padding:10px 18px;
      border-radius:30px;
      font-weight:bold;
      margin-bottom:20px;
      color:#8dffb7;
    }

    h1{
      font-size:52px;
      margin:0 0 20px;
    }

    .hero p{
      font-size:20px;
      line-height:1.6;
      opacity:.9;
    }

    .botoes{
      display:flex;
      gap:15px;
      margin-top:25px;
    }

    .btn{
      flex:1;
      padding:18px;
      border:none;
      border-radius:18px;
      font-size:20px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-verde{
      background:#22c55e;
      color:black;
    }

    .btn-azul{
      background:#1e3a6d;
      color:white;
    }

    .cards{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-bottom:35px;
    }

    .info-card{
      background:#0d2b5c;
      border-radius:25px;
      padding:25px;
    }

    .info-card h2{
      margin:0;
      font-size:50px;
    }

    .info-card p{
      margin-top:10px;
      opacity:.8;
      font-size:22px;
    }

    .section-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .section-title h2{
      margin:0;
      font-size:42px;
    }

    .section-title a{
      color:#7dff9b;
      text-decoration:none;
      font-size:22px;
      font-weight:bold;
    }

    .jogo-card{
      background:#0d2b5c;
      padding:20px;
      border-radius:20px;
      margin-bottom:15px;
    }

    .jogo-card h3{
      margin:0 0 10px;
      font-size:24px;
    }

    .jogo-card p{
      margin:5px 0;
      opacity:.85;
    }

    .jogo-card span{
      display:inline-block;
      margin-top:10px;
      background:#1e3a6d;
      padding:8px 14px;
      border-radius:15px;
      font-size:14px;
    }

    .tabela-container{
      overflow-x:auto;
      margin-top:20px;
    }

    table{
      width:100%;
      min-width:700px;
      border-collapse:collapse;
      background:#0d2b5c;
      border-radius:25px;
      overflow:hidden;
    }

    th{
      background:#133c7a;
      padding:18px;
      font-size:18px;
    }

    td{
      padding:16px;
      text-align:center;
      border-top:1px solid rgba(255,255,255,.1);
    }

    .nav{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      background:#061b3f;
      display:flex;
      justify-content:space-around;
      padding:15px 0;
    }

    .nav a{
      color:white;
      text-decoration:none;
      font-size:18px;
      opacity:.85;
    }

    .nav .active{
      color:#7dff9b;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="hero">

      <div class="tag">
        FEITO POR LV 🇧🇷
      </div>

      <h1>Brasileirão Betano 2026</h1>

      <p>
        Acompanhe classificação, jogos,
        estatísticas e informações dos clubes
        em tempo real.
      </p>

      <div class="botoes">

        <button class="btn btn-verde"
          onclick="window.location.href='jogos.html'">
          Ver jogos
        </button>

        <button class="btn btn-azul"
          onclick="window.location.href='classificacao.html'">
          Classificação
        </button>

      </div>

    </div>

    <div class="cards">

      <div class="info-card">
        <h2 id="totalTimes">0</h2>
        <p>Times</p>
      </div>

      <div class="info-card">
        <h2 id="totalRodadas">0</h2>
        <p>Rodadas</p>
      </div>

      <div class="info-card">
        <h2 id="pontosLider">0</h2>
        <p>Líder</p>
      </div>

      <div class="info-card">
        <h2 id="rodadaAtual">0ª</h2>
        <p>Rodada</p>
      </div>

    </div>

    <div class="section-title">
      <h2>Próximos jogos</h2>
      <a href="jogos.html">Ver tudo</a>
    </div>

    <div id="proximosJogos"></div>

    <div class="section-title">
      <h2>Classificação</h2>
      <a href="classificacao.html">Tabela completa</a>
    </div>

    <div class="tabela-container">

      <table>

        <thead>
          <tr>
            <th>#</th>
            <th>Time</th>
            <th>PTS</th>
            <th>J</th>
            <th>V</th>
            <th>E</th>
            <th>D</th>
            <th>SG</th>
          </tr>
        </thead>

        <tbody id="classificacaoHome"></tbody>

      </table>

    </div>

  </div>

  <div class="nav">
    <a href="index.html" class="active">Início</a>
    <a href="jogos.html">Jogos</a>
    <a href="classificacao.html">Tabela</a>
    <a href="times.html">Times</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="home.js"></script>

</body>
</html>
