<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classificação Geral</title>

  <style>
    body{
      margin:0;
      padding:0;
      background:#001845;
      font-family:Arial, sans-serif;
      color:white;
    }

    h1{
      text-align:center;
      margin-top:50px;
      font-size:60px;
    }

    table{
      width:90%;
      margin:40px auto;
      border-collapse:collapse;
      background:#102c5c;
      border-radius:25px;
      overflow:hidden;
    }

    th{
      padding:25px;
      font-size:22px;
      background:#16376d;
    }

    td{
      padding:25px;
      text-align:center;
      font-size:20px;
      border-top:1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

  <h1>Classificação Geral</h1>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Time</th>
        <th>PTS</th>
        <th>J</th>
      </tr>
    </thead>

    <tbody id="tabela">
      <tr>
        <td colspan="4">Carregando...</td>
      </tr>
    </tbody>
  </table>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="app.js"></script>

</body>
</html>
