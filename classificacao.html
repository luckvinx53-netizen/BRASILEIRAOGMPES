<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classificação</title>

  <style>

    body{
      margin:0;
      padding:0;
      background:#001845;
      color:white;
      font-family:Arial, sans-serif;
    }

    h1{
      text-align:center;
      margin-top:30px;
      font-size:42px;
    }

    .tabela-container{
      width:100%;
      overflow-x:auto;
      margin-top:20px;
    }

    table{
      width:95%;
      margin:auto;
      border-collapse:collapse;
      background:#0d2b5c;
      border-radius:20px;
      overflow:hidden;
      min-width:900px;
    }

    th{
      background:#133c7a;
      padding:15px;
      font-size:16px;
    }

    td{
      padding:14px;
      text-align:center;
      border-top:1px solid rgba(255,255,255,0.1);
      font-size:15px;
    }

    tr:hover{
      background:rgba(255,255,255,0.05);
    }

  </style>
</head>

<body>

  <h1>Classificação Geral</h1>

  <div class="tabela-container">

    <table>

      <thead>
        <tr>
          <th>#</th>
          <th>Time</th>
          <th>PTS</th>
          <th>J</th>
          <th>V</th>
          <th>E</th>
          <th>D</th>
          <th>GP</th>
          <th>GC</th>
          <th>SG</th>
        </tr>
      </thead>

      <tbody id="tabela">

        <tr>
          <td colspan="10">Carregando...</td>
        </tr>

      </tbody>

    </table>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="app.js"></script>

</body>
</html>
