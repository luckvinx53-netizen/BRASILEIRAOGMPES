<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classificação</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#001233;
      color:white;
    }

    h1{
      text-align:center;
      margin-top:30px;
    }

    table{
      width:90%;
      margin:30px auto;
      border-collapse:collapse;
      background:#0a1f44;
      border-radius:15px;
      overflow:hidden;
    }

    th,td{
      padding:15px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,0.1);
    }

    th{
      background:#102c5c;
    }
  </style>
</head>
<body>

  <h1>Classificação Geral</h1>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Time</th>
        <th>PTS</th>
        <th>J</th>
      </tr>
    </thead>

    <tbody id="tabela">
      <tr>
        <td colspan="4">Carregando...</td>
      </tr>
    </tbody>
  </table>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="app.js"></script>

</body>
</html>
